services:
  nginx:
    image: nginx:1.27-alpine
    container_name: cwt_academy_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public:/var/www/html/public:ro
    depends_on:
      php:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
      - SETPCAP
    networks:
      - cwt_network

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cwt_academy_php
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      # Fail-safe: debug is OFF unless explicitly enabled in .env.
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_HOST: mysql
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me-in-production}
      REDIS_CACHE_DB: 1
      REDIS_QUEUE_DB: 2
      REDIS_QUEUE_CONNECTION: queue
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
    volumes:
      - .:/var/www/html
      - ./docker/php/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini:ro
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini:ro
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep -q php-fpm && php -v >/dev/null 2>&1 && php -m | grep -i redis >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    networks:
      - cwt_network

  mysql:
    image: mysql:8.0.40
    container_name: cwt_academy_mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Please set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cwt_academy}
      MYSQL_USER: ${MYSQL_USER:-cwt}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Please set MYSQL_PASSWORD in .env}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    networks:
      - cwt_network

  redis:
    image: redis:7.4-alpine
    container_name: cwt_academy_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-change-me-in-production}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 60 1
      --protected-mode yes
      --rename-command CONFIG ""
      --rename-command SHUTDOWN ""
      --rename-command MODULE ""
      --rename-command REPLICAOF ""
      --rename-command SLAVEOF ""
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:-change-me-in-production}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    networks:
      - cwt_network

  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cwt_academy_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      DB_HOST: mysql
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me-in-production}
      REDIS_CACHE_DB: 1
      REDIS_QUEUE_DB: 2
      REDIS_QUEUE_CONNECTION: queue
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    networks:
      - cwt_network

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cwt_academy_scheduler
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      DB_HOST: mysql
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me-in-production}
      REDIS_CACHE_DB: 1
      REDIS_QUEUE_DB: 2
      REDIS_QUEUE_CONNECTION: queue
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    networks:
      - cwt_network

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cwt_academy_horizon
    restart: unless-stopped
    command: ["php", "artisan", "horizon"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      DB_HOST: mysql
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me-in-production}
      REDIS_CACHE_DB: 1
      REDIS_QUEUE_DB: 2
      REDIS_QUEUE_CONNECTION: queue
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    networks:
      - cwt_network

volumes:
  mysql_data:
  redis_data:

networks:
  cwt_network:
    driver: bridge
