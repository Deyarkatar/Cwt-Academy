worker_processes auto;
worker_rlimit_nofile 8192;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # -- Hardening: hide version, defeat slowloris, cap header sizes --------
    server_tokens off;
    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 30s;
    client_header_buffer_size 2k;
    large_client_header_buffers 4 8k;
    reset_timedout_connection on;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Cache static assets aggressively
    map $sent_http_content_type $cache_control {
        ~*image/                    "public, max-age=31536000, immutable";
        ~*font/                     "public, max-age=31536000, immutable";
        ~*text/css                  "public, max-age=31536000, immutable";
        ~*application/javascript    "public, max-age=31536000, immutable";
        default                     "no-cache";
    }

    upstream php-fpm {
        server php:9000 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=public:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_status 429;
    limit_conn_status 429;

    # Connection limiting per IP
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Only allow standard HTTP methods; everything else gets 405.
    map $request_method $bad_method {
        default 0;
        ~*^(GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS)$ 0;
        ~*^(TRACE|TRACK|CONNECT)$ 1;
    }

    server {
        listen 80;
        server_name _;
        root /var/www/html/public;
        index index.php;

        charset utf-8;

        if ($bad_method) {
            return 405;
        }

        location / {
            limit_req zone=public burst=40 nodelay;
            limit_conn addr 20;
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Strict rate limiting on auth endpoints
        location ~ ^/(login|admin/api/login|register) {
            limit_req zone=auth burst=10 nodelay;
            limit_conn addr 10;
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Rate limiting on API
        location ~ ^/api/ {
            limit_req zone=api burst=50 nodelay;
            try_files $uri $uri/ /index.php?$query_string;
        }

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        # Front-controller lockdown: ONLY /index.php may ever reach PHP-FPM.
        # Any other .php file (e.g. a smuggled upload) is denied outright,
        # eliminating the entire webshell / RCE-via-upload class of attacks.
        location = /index.php {
            fastcgi_pass php-fpm;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 60s;
            fastcgi_buffer_size 128k;
            fastcgi_buffers 4 256k;
            fastcgi_busy_buffers_size 256k;
            fastcgi_keep_conn on;
            # Never expose PHP-FPM internals in headers.
            fastcgi_hide_header X-Powered-By;
        }

        location ~* \.(?:php|phar|phtml|php\d)$ {
            deny all;
        }

        # Block source/config/backup artifacts that must never be served.
        location ~* (?:composer\.(json|lock)|package(-lock)?\.json|artisan|\.(env|git|htaccess|log|sql|bak|swp|save|orig|dist|yml|yaml|ini|sh|twig|blade\.php))$ {
            deny all;
        }

        location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control $cache_control;
            access_log off;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
