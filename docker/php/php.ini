[PHP]
memory_limit=1G
upload_max_filesize=10M
post_max_size=10M
max_execution_time=60
max_input_vars=3000
max_file_uploads=20

realpath_cache_size=8192K
realpath_cache_ttl=600

date.timezone=UTC

expose_php=Off

; --- 2026 hardening baseline -------------------------------------------------
; NOTE: disable_functions / allow_url_fopen are enforced in the FPM pool only
; (www.conf) because the CLI in this image also runs Horizon, artisan and
; Composer, which legitimately need proc_open / url fopen.
; No remote file inclusion, ever (safe for CLI too).
allow_url_include=Off
; Never leak stack traces or paths to clients; log instead.
display_errors=Off
display_startup_errors=Off
log_errors=On
error_reporting=E_ALL
; Defeat PATH_INFO script-smuggling (e.g. /uploads/x.jpg/foo.php).
cgi.fix_pathinfo=0
; Cap request parsing time (slow POST DoS).
max_input_time=30
; Harden native PHP sessions in case anything falls back to them.
session.use_strict_mode=1
session.cookie_httponly=1
session.cookie_samesite=Strict
session.use_only_cookies=1
; SSRF/response-splitting hygiene for outbound HTTP wrappers.
url_rewriter.tags=
mail.add_x_header=Off

[opcache]
opcache.enable=1
opcache.memory_consumption=512
opcache.interned_strings_buffer=32
opcache.max_accelerated_files=50000
opcache.revalidate_freq=60
opcache.fast_shutdown=1
opcache.jit_buffer_size=128M
opcache.jit=tracing
