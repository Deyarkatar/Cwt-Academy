[global]
daemonize = no
error_log = /proc/self/fd/2

[www]
user = www-data
group = www-data
listen = 9000
listen.owner = www-data
listen.group = www-data

pm = ondemand
pm.max_children = 200
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 35
pm.process_idle_timeout = 10s
pm.max_requests = 1000

request_terminate_timeout = 60s

access.log = /proc/self/fd/2
slowlog = /proc/self/fd/2
request_slowlog_timeout = 10s

catch_workers_output = yes
decorate_workers_output = no

; --- Web-request-only hardening (does NOT affect CLI/Horizon/Composer) -------
; Remove the command-execution gadget surface from every HTTP request.
php_admin_value[disable_functions] = exec,passthru,shell_exec,system,proc_open,popen,pcntl_exec,pcntl_fork,dl,pfsockopen
; Force all outbound HTTP through curl (auditable); block fopen-based SSRF.
php_admin_flag[allow_url_fopen] = off
php_admin_flag[allow_url_include] = off
; Never leak errors to clients from the web pool, regardless of ini.
php_admin_flag[display_errors] = off
php_admin_flag[expose_php] = off
