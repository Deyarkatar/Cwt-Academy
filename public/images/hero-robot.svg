<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <!-- Soft gold glow behind the robot -->
  <circle cx="400" cy="400" r="300" fill="url(#glow)" opacity="0.25"/>

  <!-- Robot body -->
  <rect x="260" y="280" width="280" height="240" rx="48" fill="#1a1a1a" stroke="#FFD700" stroke-width="4"/>

  <!-- Screen / face -->
  <rect x="300" y="320" width="200" height="120" rx="24" fill="#0e0e0e" stroke="#FFD700" stroke-width="2"/>

  <!-- Eyes -->
  <circle cx="360" cy="370" r="18" fill="#FFD700"/>
  <circle cx="440" cy="370" r="18" fill="#FFD700"/>
  <circle cx="364" cy="366" r="6" fill="#0e0e0e"/>
  <circle cx="444" cy="366" r="6" fill="#0e0e0e"/>

  <!-- Antenna -->
  <line x1="400" y1="280" x2="400" y2="180" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>
  <circle cx="400" cy="170" r="16" fill="#FFD700"/>
  <circle cx="400" cy="170" r="8" fill="#1a1a1a"/>

  <!-- Ears / side panels -->
  <rect x="210" y="340" width="40" height="100" rx="16" fill="#1a1a1a" stroke="#FFD700" stroke-width="3"/>
  <rect x="550" y="340" width="40" height="100" rx="16" fill="#1a1a1a" stroke="#FFD700" stroke-width="3"/>

  <!-- Neck -->
  <rect x="370" y="520" width="60" height="60" fill="#2a2a2a"/>

  <!-- Base / wheels -->
  <path d="M280 600 Q280 560 320 560 L480 560 Q520 560 520 600 L520 640 Q520 660 500 660 L300 660 Q280 660 280 640 Z" fill="#1a1a1a" stroke="#FFD700" stroke-width="4"/>
  <circle cx="340" cy="640" r="28" fill="#333"/>
  <circle cx="460" cy="640" r="28" fill="#333"/>
  <circle cx="340" cy="640" r="14" fill="#FFD700"/>
  <circle cx="460" cy="640" r="14" fill="#FFD700"/>

  <!-- Decorative circuit lines -->
  <path d="M320 460 H400" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <circle cx="400" cy="460" r="5" fill="#FFD700"/>
  <path d="M400 460 V500" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>

  <defs>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 400) scale(300)">
      <stop stop-color="#FFD700"/>
      <stop offset="1" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
