name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-asyncio httpx

      - name: Lint with Ruff
        run: ruff check core/ modules/ reports/ utils/ tests/ main.py

      - name: Type check with mypy
        run: mypy core/ modules/ reports/ utils/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --cov=core --cov=modules --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
